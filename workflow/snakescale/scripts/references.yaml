# ============================================================================
# references.yaml — 全量物种参考索引路径配置
#
# 路径均相对于 reference/ 目录。
# filter:             Bowtie2 索引 (rtRNA/rRNA 过滤)
# transcriptome:      Bowtie2 索引 (转录组比对)
# regions:            BED 文件 (CDS/UTR 区域定义)
# transcript_lengths: TSV 文件 (转录本长度)
#
# ★ 索引路径已通过扫描 reference/filter/ 和 reference/transcriptome/
#   目录实际文件验证。
# ============================================================================

# ── 已有索引的 21 个物种 ────────────────────────────────────────────────────

